<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked AI Mood Detector</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #121212; color: white; }
        .container { background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 80%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { margin-top: 15px; padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #444; }
        #result { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mood Detector AI</h2>
    <p>Type how you feel and the AI will analyze it locally.</p>
    <input type="text" id="input" placeholder="Enter a sentence...">
    <button id="btn">Analyze Mood</button>
    <div id="result">Waiting for input...</div>
</div>

<script type="module">
    // 1. Load the AI from the CDN (Unblocked)
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1/dist/transformers.min.js';

    const btn = document.getElementById('btn');
    const input = document.getElementById('input');
    const resultDiv = document.getElementById('result');

    let classifier;

    // 2. Initialize the AI model
    async function init() {
        resultDiv.innerText = "🧠 Loading AI... (First time takes a sec)";
        btn.disabled = true;
        classifier = await pipeline('sentiment-analysis', 'Xenova/distilbert-base-uncased-finetuned-sst-2-english');
        resultDiv.innerText = "✅ AI Ready!";
        btn.disabled = false;
    }

    init();

    // 3. Run the AI when clicked
    btn.onclick = async () => {
        if (!input.value) return;
        resultDiv.innerText = "Analyzing...";
        const output = await classifier(input.value);
        
        const mood = output[0].label;
        const score = Math.round(output[0].score * 100);
        
        resultDiv.innerText = mood === 'POSITIVE' 
            ? `😊 Positive (${score}%)` 
            : `☹️ Negative (${score}%)`;
    };
</script>

</body>
</html>
