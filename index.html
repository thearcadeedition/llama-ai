<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Agent LLM</title>
    <style>
        :root {
            --sidebar-bg: #000000;
            --main-bg: #212121;
            --text-main: #ececec;
            --text-secondary: #b4b4b4;
            --input-bg: #2f2f2f;
            --accent-emerald: #10a37f; 
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body { margin: 0; background-color: var(--main-bg); color: var(--text-main); font-family: var(--font-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 260px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; padding: 12px; border-right: 1px solid #333; }
        .new-chat-btn { border: 1px solid #4d4d4d; border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: white; transition: 0.2s; }
        .new-chat-btn:hover { background: #2b2b2b; border-color: var(--accent-emerald); }

        /* Logo Area - Drop your image here */
        .logo-box { width: 44px; height: 44px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: auto; border-radius: 4px; }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Loading Screen */
        #loader { position: absolute; inset: 0; background: var(--main-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s ease; }
        .progress-track { width: 250px; height: 4px; background: #333; border-radius: 2px; margin: 20px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-emerald); transition: width 0.3s; }

        #chat-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; width: 100%; padding-bottom: 50px; }
        .message-row { padding: 24px 15%; display: flex; gap: 20px; width: 100%; box-sizing: border-box; }

        .avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: bold; color: white; }
        .user .avatar { background: #5436da; } 
        .ai .avatar { background: var(--accent-emerald); }

        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; flex: 1; }

        footer { padding: 20px 0 40px; display: flex; justify-content: center; }
        .input-pill { width: 85%; max-width: 768px; background: var(--input-bg); border-radius: 14px; padding: 10px 18px; display: flex; align-items: center; border: 1px solid #4d4d4d; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; }
        #send-btn { background: var(--accent-emerald); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #send-btn:disabled { background: #494949; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo-box">
            <img src="logo.png" alt="Core Logo">
        </div>
        <div class="new-chat-btn" id="new-chat-trigger"><span>+</span> New Chat</div>
        <div style="margin-top: auto; color: var(--text-secondary); font-size: 11px; padding: 10px; text-align: center;">Core Agent v1.2</div>
    </div>

    <main>
        <div id="loader">
            <div class="loader-content" style="text-align: center;">
                <h2 style="font-weight: 600; margin-bottom: 5px;">Core Agent</h2>
                <div id="loader-text" style="font-size: 13px; color: var(--text-secondary);">Setting up local engine...</div>
                <div class="progress-track"><div id="progress-bar"></div></div>
                <div style="font-size: 11px; color: #555;">Downloading 1.6GB (Cached locally after first load)</div>
            </div>
        </div>

        <div id="chat-container"></div>

        <footer>
            <div class="input-pill">
                <input type="text" id="user-input" placeholder="Type something..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </footer>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const SYSTEM_BEHAVIOR = "You are Core Agent LLM. You are an independent, optimistic expert. Be direct, clear, and high-utility. Avoid sycophancy or overly formal sci-fi language. Talk like a smart, capable peer who gets things done.";

        const chatContainer = document.getElementById("chat-container");
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const progressBar = document.getElementById("progress-bar");
        const loader = document.getElementById("loader");
        const newChatBtn = document.getElementById("new-chat-trigger");

        const chatHistory = [{ role: "system", content: SYSTEM_BEHAVIOR }];
        const engine = new webllm.MLCEngine();

        engine.setInitProgressCallback((report) => {
            progressBar.style.width = Math.round(report.progress * 100) + "%";
        });

        async function init() {
            try {
                await engine.reload("gemma-2b-it-q4f32_1-MLC");
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
                input.disabled = false;
                btn.disabled = false;
                appendMessage("Core Agent is ready. What's on your mind?", 'ai', 'C');
            } catch (e) { console.error(e); }
        }

        async function handleSendMessage() {
            const text = input.value.trim();
            if (!text) return;
            appendMessage(text, 'user', 'U');
            chatHistory.push({ role: "user", content: text });
            input.value = "";
            const aiRow = appendMessage("...", 'ai', 'C');
            const aiContent = aiRow.querySelector('.content');
            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    temperature: 0.5, // Balanced for natural but expert responses
                    stream: true,
                });
                let fullResponse = "";
                for await (const chunk of chunks) {
                    fullResponse += chunk.choices[0]?.delta?.content || "";
                    aiContent.innerText = fullResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
                chatHistory.push({ role: "assistant", content: fullResponse });
            } catch (err) { aiContent.innerText = "Something went wrong. Let's try again."; }
        }

        function appendMessage(text, className, avatarChar) {
            const row = document.createElement("div");
            row.className = `message-row ${className}`;
            row.innerHTML = `<div class="avatar">${avatarChar}</div><div class="content">${text}</div>`;
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return row;
        }

        newChatBtn.addEventListener('click', () => {
            chatContainer.innerHTML = '';
            chatHistory.length = 0;
            chatHistory.push({ role: "system", content: SYSTEM_BEHAVIOR });
            appendMessage("Starting a new thread. How can I help?", 'ai', 'C');
        });

        btn.onclick = handleSendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSendMessage(); };
        init();
    </script>
</body>
</html>
