<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core LLM</title>
    <style>
        :root {
            --sidebar-bg: #000000;
            --main-bg: #212121;
            --text-main: #ececec;
            --text-secondary: #b4b4b4;
            --input-bg: #2f2f2f;
            --accent-emerald: #10a37f; 
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body { margin: 0; background-color: var(--main-bg); color: var(--text-main); font-family: var(--font-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 260px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; padding: 12px; border-right: 1px solid #333; flex-shrink: 0; }
        .logo-box { width: 55px; height: 55px; margin: 10px auto; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: auto; filter: invert(1); }

        .sidebar-header { font-size: 11px; color: #666; margin: 15px 5px 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .new-chat-btn { border: 1px solid #4d4d4d; border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: white; transition: 0.2s; margin-bottom: 20px; }
        .new-chat-btn:hover { background: #2b2b2b; border-color: var(--accent-emerald); }

        #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        
        .chat-item-wrapper { position: relative; display: flex; align-items: center; group; }
        
        .chat-item { flex: 1; padding: 10px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; border: 1px solid transparent; }
        .chat-item:hover { background: #1a1a1a; color: white; }
        .chat-item.active { background: #2a2a2a; border-color: #444; color: white; }

        .delete-btn { opacity: 0; position: absolute; right: 10px; background: none; border: none; color: #666; cursor: pointer; font-size: 16px; padding: 0 5px; transition: 0.2s; }
        .chat-item-wrapper:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #ff4b4b; }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Loader */
        #loader { position: absolute; inset: 0; background: var(--main-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s ease; }
        .progress-track { width: 250px; height: 4px; background: #333; border-radius: 2px; margin: 20px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-emerald); transition: width 0.3s; }

        #chat-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; width: 100%; padding-bottom: 50px; }
        .message-row { padding: 24px 12%; display: flex; gap: 20px; width: 100%; box-sizing: border-box; }
        
        .avatar { min-width: 36px; height: 32px; padding: 0 8px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 600; color: white; }
        .user .avatar { background: #5436da; } 
        .ai .avatar { background: var(--accent-emerald); }
        
        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; flex: 1; color: #d1d1d1; }

        footer { padding: 20px 0 40px; display: flex; justify-content: center; }
        .input-pill { width: 85%; max-width: 768px; background: var(--input-bg); border-radius: 14px; padding: 10px 18px; display: flex; align-items: center; border: 1px solid #4d4d4d; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; }
        #send-btn { background: var(--accent-emerald); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo-box"><img src="logo.png" alt="Core"></div>
        <div class="new-chat-btn" id="new-chat-trigger"><span>+</span> New Chat</div>
        <div class="sidebar-header">Create up to 10 chats</div>
        <div id="chat-list"></div>
        <div style="margin-top: auto; color: var(--text-secondary); font-size: 11px; padding: 10px; text-align: center;">Core LLM v1.6</div>
    </div>

    <main>
        <div id="loader">
            <h2 style="font-weight: 600; margin-bottom: 5px; letter-spacing: 1px;">CORE LLM</h2>
            <div id="loader-text" style="font-size: 13px; color: var(--text-secondary);">Optimizing local brain...</div>
            <div class="progress-track"><div id="progress-bar"></div></div>
        </div>

        <div id="chat-container"></div>

        <footer>
            <div class="input-pill">
                <input type="text" id="user-input" placeholder="Ask something..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </footer>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const SYSTEM_BEHAVIOR = "You are Core LLM, an independent expert. Be direct, clear, and optimistic. Provide high-utility answers. Talk like a smart, capable peer. No sycophancy.";
        const USER_LABEL = "You";
        
        const chatContainer = document.getElementById("chat-container");
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const progressBar = document.getElementById("progress-bar");
        const loader = document.getElementById("loader");
        const chatListEl = document.getElementById("chat-list");

        let engine = new webllm.MLCEngine();
        let currentChatId = null;
        let allChats = JSON.parse(localStorage.getItem('core_llm_chats')) || [];

        function saveToStorage() {
            localStorage.setItem('core_llm_chats', JSON.stringify(allChats));
            renderSidebar();
        }

        function renderSidebar() {
            chatListEl.innerHTML = '';
            allChats.forEach((chat) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'chat-item-wrapper';

                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                div.innerText = chat.title || "New Thread";
                div.onclick = () => loadChat(chat.id);

                const del = document.createElement('button');
                del.className = 'delete-btn';
                del.innerHTML = '&times;';
                del.title = 'Delete Chat';
                del.onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id);
                };

                wrapper.appendChild(div);
                wrapper.appendChild(del);
                chatListEl.appendChild(wrapper);
            });
        }

        function deleteChat(id) {
            allChats = allChats.filter(c => c.id !== id);
            if (currentChatId === id) {
                if (allChats.length > 0) loadChat(allChats[0].id);
                else startNewChat();
            } else {
                saveToStorage();
            }
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = allChats.find(c => c.id === id);
            chatContainer.innerHTML = '';
            chat.messages.forEach(m => {
                if(m.role !== 'system') appendMessage(m.content, m.role === 'user' ? 'user' : 'ai');
            });
            renderSidebar();
        }

        function startNewChat() {
            if (allChats.length >= 10) {
                alert("Limit reached. Delete an existing thread to start a new one.");
                return;
            }
            const newId = Date.now();
            const newChat = {
                id: newId,
                title: "New conversation",
                messages: [{ role: "system", content: SYSTEM_BEHAVIOR }]
            };
            allChats.unshift(newChat);
            currentChatId = newId;
            saveToStorage();
            loadChat(newId);
            appendMessage("Core LLM is ready. What's on your mind?", 'ai');
        }

        engine.setInitProgressCallback((report) => {
            progressBar.style.width = Math.round(report.progress * 100) + "%";
        });

        async function init() {
            try {
                await engine.reload("gemma-2b-it-q4f32_1-MLC");
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
                input.disabled = false;
                btn.disabled = false;
                
                if (allChats.length > 0) loadChat(allChats[0].id);
                else startNewChat();
            } catch (e) { console.error(e); }
        }

        async function handleSendMessage() {
            const text = input.value.trim();
            if (!text) return;

            const chat = allChats.find(c => c.id === currentChatId);
            if(chat.messages.length <= 2) chat.title = text.substring(0, 24);

            appendMessage(text, 'user');
            chat.messages.push({ role: "user", content: text });
            input.value = "";
            saveToStorage();

            const aiRow = appendMessage("...", 'ai');
            const aiContent = aiRow.querySelector('.content');

            try {
                const chunks = await engine.chat.completions.create({ messages: chat.messages, temperature: 0.5, stream: true });
                let reply = "";
                for await (const chunk of chunks) {
                    reply += chunk.choices[0]?.delta?.content || "";
                    aiContent.innerText = reply;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
                chat.messages.push({ role: "assistant", content: reply });
                saveToStorage();
            } catch (err) { aiContent.innerText = "Error. Please check connection."; }
        }

        function appendMessage(text, className) {
            const row = document.createElement("div");
            row.className = `message-row ${className}`;
            const label = (className === 'user') ? USER_LABEL : 'C';
            row.innerHTML = `<div class="avatar">${label}</div><div class="content">${text}</div>`;
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return row;
        }

        document.getElementById("new-chat-trigger").onclick = startNewChat;
        btn.onclick = handleSendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSendMessage(); };
        
        init();
        renderSidebar();
    </script>
</body>
</html>
