<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcadeLLM | Local AI</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Loading Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .loader-box { width: 300px; text-align: center; }
        .progress-container { width: 100%; background: #333; height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00d1b2; transition: width 0.3s; }
        #loader-text { color: #00d1b2; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #loader-subtext { font-size: 12px; color: #888; }

        header { padding: 15px 20px; background: #1a1a1a; border-bottom: 2px solid #00d1b2; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.5rem; color: #00d1b2; letter-spacing: 2px; text-transform: uppercase; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #2a2a2a; border: 1px solid #333; border-bottom-left-radius: 2px; }
        
        #controls { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #444; background: #0f0f0f; color: white; outline: none; }
        button { padding: 0 25px; border-radius: 8px; border: none; background: #00d1b2; color: #0f0f0f; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-box">
            <h1 style="color: #00d1b2; margin-bottom: 5px;">ArcadeLLM</h1>
            <div id="loader-text">Waking up the brain...</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div id="loader-subtext">Grabbing the 1.6GB AI model. <br>This only happens once!</div>
        </div>
    </div>

    <header>
        <h1>ArcadeLLM</h1>
        <div style="font-size: 10px; color: #00d1b2;">● LOCAL GPU ACCELERATED</div>
    </header>

    <div id="chat-box">
        <div class="msg ai">Hello! I am <strong>ArcadeLLM</strong>. My brain is now fully loaded into your browser. How can I help you today?</div>
    </div>

    <div id="controls">
        <input type="text" id="user-input" placeholder="Ask ArcadeLLM anything..." disabled>
        <button id="send-btn" disabled>SEND</button>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const loader = document.getElementById("loader");
        const progressBar = document.getElementById("progress-bar");
        const loaderText = document.getElementById("loader-text");
        const btn = document.getElementById("send-btn");
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");

        const selectedModel = "gemma-2b-it-q4f32_1-MLC"; 
        const engine = new webllm.MLCEngine();

        const chatHistory = [
            { role: "system", content: "You are ArcadeLLM, a helpful AI assistant on an unblocked site. Be friendly and natural." }
        ];

        // This function handles the "Downloading" messages
        engine.setInitProgressCallback((report) => {
            // Update the progress bar
            const progress = Math.round(report.progress * 100);
            progressBar.style.width = progress + "%";
            
            // Update the text to be very clear
            loaderText.innerText = `Downloading AI: ${progress}%`;
            
            if (progress >= 100) {
                loaderText.innerText = "Finishing setup...";
            }
        });

        async function init() {
            try {
                await engine.reload(selectedModel);
                // Hide loader and enable inputs
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
                input.disabled = false;
                btn.disabled = false;
            } catch (e) {
                loaderText.innerText = "Error: WebGPU Not Supported";
                loaderText.style.color = "#ff4444";
            }
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;
            appendMsg(text, 'user');
            chatHistory.push({ role: "user", content: text });
            input.value = "";
            const aiMsgDiv = appendMsg("...", 'ai');
            
            const chunks = await engine.chat.completions.create({
                messages: chatHistory, 
                temperature: 0.7,
                stream: true,
            });

            let reply = "";
            for await (const chunk of chunks) {
                reply += chunk.choices[0]?.delta?.content || "";
                aiMsgDiv.innerText = reply;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
            chatHistory.push({ role: "assistant", content: reply });
        }

        function appendMsg(text, role) {
            const div = document.createElement("div");
            div.className = `msg ${role}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        btn.onclick = send;
        input.onkeypress = (e) => { if(e.key === 'Enter') send(); };

        init();
    </script>
</body>
</html>
